# ──────────────────────────────────────────────────────────────
# Build settings
# ──────────────────────────────────────────────────────────────

[build]
  # المجلد الرئيسي هو الجذر
  base    = "."

  # الأمر اللي بيبني المشروع (استخدام pnpm بدل npm)
  command = "pnpm install && pnpm build"

  # المجلد اللي Vite بيطلع فيه (dist)
  publish = "dist"

# Redirects لـ Single Page App
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ──────────────────────────────────────────────────────────────
# Optional: Minify & compress
# ──────────────────────────────────────────────────────────────

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
