[build]
  command = "pnpm build"
  publish = "dist/public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
[build.processing.css]
  minify = true

[build.processing.js]
  minify = true

[build.processing.images]
  compress = true

# Netlify Forms Configuration
[[forms]]
  name = "booking"
  method = "POST"
  
# Email notifications for form submissions
[[redirects]]
  from = "/form-success"
  to = "/"
  status = 200
