# ──────────────────────────────────────────────────────────────
# Build settings
# ──────────────────────────────────────────────────────────────

[build]
  # المجلد الرئيسي الذي يحتوي على الكود
  base = "client"

  # الأمر الذي يبني المشروع (باستخدام pnpm)
  command = "pnpm install && pnpm build"

  # المجلد الذي سيتم نشره (الذي ينشئه أمر البناء)
  publish = "dist"

# Redirects لـ Single Page App
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
