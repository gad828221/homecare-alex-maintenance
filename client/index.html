    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "4e110360-2a24-4aa3-be39-050c0ed9a3e0",
          allowLocalhostAsSecureOrigin: true,
        });
        console.log("OneSignal ready");
        
        // محاولة تسجيل الدخول إذا كان هناك مستخدم مخزن
        const storedUser = localStorage.getItem('currentUser');
        if (storedUser) {
          try {
            const user = JSON.parse(storedUser);
            const userId = user.id.toString();
            await OneSignal.login(userId);
            
            // إضافة معرفات إضافية لضمان وصول الإشعارات
            if (user.role === 'tech') {
              await OneSignal.login(`tech_${user.id}`);
            } else if (user.role === 'admin' || user.role === 'manager') {
              await OneSignal.login(`admin_${user.id}`);
              await OneSignal.login(`manager_${user.id}`);
            }
            // إعادة تسجيل الدخول بالمعرف الأساسي ليكون هو النشط
            await OneSignal.login(userId);
            console.log("OneSignal login success:", userId);
          } catch(e) { console.error(e); }
        }
      });
      
      // استمع لحدث مخصص من React لتسجيل الدخول بعد تحميل الصفحة
      window.addEventListener('onesignal-login', async (event) => {
        const { userId } = event.detail;
        if (window.OneSignalDeferred) {
          const [oneSignalPromise] = window.OneSignalDeferred;
          const OneSignal = await oneSignalPromise?.(OneSignal);
          if (OneSignal) await OneSignal.login(userId);
        }
      });
    </script>
